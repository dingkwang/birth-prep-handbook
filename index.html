<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="准父母中文资料库：生产准备与婴儿护理课程讲义。">
  <title>准父母中文资料库</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f5;
      --paper: #ffffff;
      --ink: #202522;
      --muted: #5f6b66;
      --line: #d6dfdb;
      --green: #0f766e;
      --green-soft: #e0f2ef;
      --coral: #a94f3f;
      --coral-soft: #f8e7e3;
      --shadow: 0 14px 36px rgba(24, 44, 38, 0.09);
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
    }

    a:focus-visible {
      outline: 3px solid rgba(15, 118, 110, 0.28);
      outline-offset: 4px;
    }

    .site-header {
      border-bottom: 1px solid var(--line);
      background: var(--paper);
    }

    .header-inner,
    main {
      width: min(100% - 36px, 980px);
      margin: 0 auto;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 64px;
      gap: 20px;
    }

    .site-name {
      margin: 0;
      font-size: 17px;
      font-weight: 750;
    }

    .site-note {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    main {
      padding: clamp(48px, 8vw, 88px) 0 72px;
    }

    .intro {
      max-width: 640px;
      margin-bottom: 30px;
    }

    .intro h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 5vw, 46px);
      line-height: 1.2;
      letter-spacing: 0;
    }

    .intro p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
    }

    .courses {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .course {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      min-width: 0;
      min-height: 260px;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      color: var(--ink);
      box-shadow: var(--shadow);
      text-decoration: none;
      transition: border-color 150ms ease, transform 150ms ease;
    }

    .course:hover {
      border-color: var(--course-color);
      transform: translateY(-2px);
    }

    .course-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      margin-bottom: 24px;
      border-radius: 8px;
      background: var(--course-soft);
      color: var(--course-color);
      font-size: 14px;
      font-weight: 800;
    }

    .course h2 {
      margin: 0 0 8px;
      font-size: 23px;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .course p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .course-action {
      margin-top: 24px;
      color: var(--course-color);
      font-size: 14px;
      font-weight: 750;
    }

    .birth-course {
      --course-color: var(--green);
      --course-soft: var(--green-soft);
    }

    .baby-course {
      --course-color: var(--coral);
      --course-soft: var(--coral-soft);
    }

    .disclaimer {
      margin: 26px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 680px) {
      .header-inner {
        align-items: flex-start;
        flex-direction: column;
        justify-content: center;
        padding: 14px 0;
        gap: 2px;
      }

      main { padding-top: 40px; }
      .courses { grid-template-columns: 1fr; }
      .course { min-height: 230px; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <p class="site-name">准父母中文资料库</p>
      <p class="site-note">课程讲义与实用清单</p>
    </div>
  </header>

  <main>
    <section class="intro" aria-labelledby="pageTitle">
      <h1 id="pageTitle">选择课程</h1>
      <p>两门课程相互独立，可按当前需要进入阅读。</p>
    </section>

    <nav class="courses" aria-label="课程选择">
      <a class="course birth-course" href="birth_preparation.html">
        <span class="course-number" aria-hidden="true">01</span>
        <h2>生产准备课中文手册</h2>
        <p>分娩过程、住院准备、疼痛管理与产后早期注意事项。</p>
        <span class="course-action">打开课程 →</span>
      </a>

      <a class="course baby-course" href="the_baby_academy_lesson_1.html">
        <span class="course-number" aria-hidden="true">02</span>
        <h2>婴儿护理课讲义</h2>
        <p>换尿布、脐带护理、安全睡眠、室温穿衣与常见问答。</p>
        <span class="course-action">打开课程 →</span>
      </a>
    </nav>

    <p class="disclaimer">资料仅供学习与准备，不能替代医生、助产士或护士的个体化医疗建议。</p>
  </main>
</body>
</html>
